<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d") no-repeat center/cover;
height:100vh;
}

nav{
background:rgba(0,0,0,0.7);
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#4CAF50;
}

.container{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
width:380px;
margin:60px auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
text-align:center;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px 12px;
background:#4CAF50;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#388e3c;
}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.completed{
text-decoration:line-through;
color:gray;
}

.progress-bar{
background:#ddd;
height:10px;
border-radius:10px;
margin-top:20px;
}

#progress{
height:10px;
background:#4CAF50;
width:0%;
border-radius:10px;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Dashboard</a>
<a href="analytics.html">Analytics</a>
<a href="settings.html">Settings</a>
</nav>

<div class="container">

<h1>Habit Tracker</h1>

<input id="habitInput" placeholder="Add new habit">
<button onclick="addHabit()">Add</button>

<ul id="habitList"></ul>

<div class="progress-bar">
<div id="progress"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
